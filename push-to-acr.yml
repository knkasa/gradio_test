name: Build and Push to ACR

# ── Manual trigger only ──────────────────────────────────────────────────────
on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag (e.g. v1.0.0, latest)"
        required: true
        default: "latest"

# ── Variables — update these to match your environment ──────────────────────
env:
  ACR_NAME: ${{ vars.ACR_NAME }}           # e.g.  myacr  (no .azurecr.io)
  IMAGE_NAME: gradio-test                 # image name inside ACR

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout source
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Log in to ACR using stored credentials
      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_NAME }}.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # 3. Build and push
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.event.inputs.image_tag }}
            ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest

      # 4. Summary
      - name: Print image reference
        run: |
          echo "✅ Pushed: ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.event.inputs.image_tag }}"